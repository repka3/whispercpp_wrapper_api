<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Whisper.cpp Wrapper</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #15181e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header,
      .toolbar,
      .status-line,
      .job-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      header {
        align-items: end;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.15;
      }

      h2 {
        margin: 0;
        font-size: 17px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button,
      .button-link {
        border: 0;
        border-radius: 6px;
        background: #176c72;
        color: white;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 650;
        text-decoration: none;
        white-space: nowrap;
      }

      button.secondary,
      .button-link.secondary {
        background: #374151;
      }

      button.danger {
        background: #a63636;
      }

      button:disabled,
      .button-link.disabled {
        cursor: wait;
        opacity: 0.6;
        pointer-events: none;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      section,
      .panel {
        background: white;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        padding: 18px;
      }

      form {
        display: grid;
        gap: 13px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #374151;
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select {
        width: 100%;
        border: 1px solid #c6ceda;
        border-radius: 6px;
        padding: 9px 10px;
        color: #111827;
        background: #fff;
      }

      .fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .status-line {
        margin: 18px 0 12px;
      }

      .pill {
        border-radius: 999px;
        background: #e8eef5;
        padding: 4px 9px;
        font-size: 13px;
        font-weight: 700;
      }

      .pill.succeeded {
        background: #dff4e8;
        color: #17623a;
      }

      .pill.failed {
        background: #fde2e2;
        color: #8a1f1f;
      }

      progress {
        width: 100%;
        height: 14px;
      }

      pre {
        min-height: 180px;
        max-height: 420px;
        overflow: auto;
        margin: 14px 0 0;
        padding: 14px;
        border-radius: 8px;
        background: #111827;
        color: #e5e7eb;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .error {
        display: none;
        margin-top: 12px;
        border: 1px solid #f2a0a0;
        background: #fff2f2;
        color: #8a1f1f;
        border-radius: 6px;
        padding: 10px;
        overflow-wrap: anywhere;
      }

      .jobs {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .job {
        border: 1px solid #dde3ec;
        border-radius: 8px;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .job-head,
      .job-meta {
        display: grid;
        gap: 8px;
      }

      .job-head {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }

      .filename {
        font-weight: 750;
        overflow-wrap: anywhere;
      }

      .muted {
        color: #5f6b7a;
        font-size: 13px;
      }

      .job-meta {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .metric {
        min-width: 0;
        border-left: 3px solid #cbd6e3;
        padding-left: 8px;
      }

      .metric strong {
        display: block;
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .metric span {
        color: #5f6b7a;
        font-size: 12px;
      }

      .job-actions {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .empty {
        color: #5f6b7a;
        border: 1px dashed #c6ceda;
        border-radius: 8px;
        padding: 22px;
        text-align: center;
      }

      @media (max-width: 980px) {
        header,
        .grid {
          display: grid;
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 680px) {
        .fields,
        .job-head,
        .job-meta {
          grid-template-columns: 1fr;
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Whisper.cpp Wrapper</h1>
        </div>
        <button class="secondary" id="healthButton" type="button">Check health</button>
      </header>

      <div class="grid">
        <section>
          <h2>Submit transcription</h2>
          <form id="uploadForm">
            <label>
              Audio or video file
              <input id="fileInput" name="file" type="file" accept="audio/*,video/*" />
            </label>

            <label>
              Local path
              <input id="pathInput" name="path" type="text" placeholder="/absolute/path/to/audio.mp3" />
            </label>

            <div class="fields">
              <label>
                Model
                <select id="model" name="model" required>
                  <option value="">Loading models...</option>
                </select>
              </label>
              <label>
                Language
                <input id="language" name="language" type="text" value="it" />
              </label>
              <label>
                Beam size
                <input id="beamSize" name="beam_size" type="number" min="1" value="3" />
              </label>
              <label>
                Best of
                <input id="bestOf" name="best_of" type="number" min="1" value="3" />
              </label>
              <label>
                VAD threshold
                <input id="vadThreshold" name="vad_threshold" type="number" min="0" max="1" step="0.01" value="0.1" />
              </label>
              <label>
                VAD max speech seconds
                <input id="vadMax" name="vad_max_speech_duration_s" type="number" min="1" value="30" />
              </label>
              <label>
                VAD min silence ms
                <input id="vadSilence" name="vad_min_silence_duration_ms" type="number" min="0" value="2000" />
              </label>
              <label>
                VAD speech pad ms
                <input id="vadPad" name="vad_speech_pad_ms" type="number" min="0" value="400" />
              </label>
              <label>
                Chunking
                <select id="chunkingMode" name="chunking_mode">
                  <option value="auto" selected>auto</option>
                  <option value="always">always</option>
                  <option value="off">off</option>
                </select>
              </label>
              <label>
                Chunk minutes
                <input id="chunkMinutes" name="chunk_minutes" type="number" min="1" value="30" />
              </label>
              <label>
                Overlap seconds
                <input id="chunkOverlap" name="chunk_overlap_seconds" type="number" min="0" value="30" />
              </label>
              <label>
                Repetition guard
                <select id="repetitionGuard" name="repetition_guard">
                  <option value="true" selected>on</option>
                  <option value="false">off</option>
                </select>
              </label>
            </div>

            <div class="actions">
              <button id="uploadButton" type="button">Upload file</button>
              <button id="pathButton" type="button">Submit path</button>
            </div>
          </form>
          <div class="error" id="errorBox"></div>

          <div class="status-line">
            <h2>Current job</h2>
            <span class="pill" id="statusPill">idle</span>
          </div>
          <progress id="progress" value="0" max="100"></progress>
          <pre id="output">{}</pre>
        </section>

        <section>
          <div class="toolbar">
            <h2>Completed jobs</h2>
            <button class="secondary" id="refreshJobsButton" type="button">Refresh</button>
          </div>
          <div class="jobs" id="jobsList">
            <div class="empty">Loading jobs...</div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const state = {
        pollTimer: null,
      };

      const output = document.querySelector("#output");
      const errorBox = document.querySelector("#errorBox");
      const statusPill = document.querySelector("#statusPill");
      const progress = document.querySelector("#progress");
      const uploadButton = document.querySelector("#uploadButton");
      const pathButton = document.querySelector("#pathButton");
      const healthButton = document.querySelector("#healthButton");
      const refreshJobsButton = document.querySelector("#refreshJobsButton");
      const jobsList = document.querySelector("#jobsList");
      const modelSelect = document.querySelector("#model");

      function values() {
        return {
          model: modelSelect.value,
          language: document.querySelector("#language").value || "it",
          beam_size: Number(document.querySelector("#beamSize").value || 3),
          best_of: Number(document.querySelector("#bestOf").value || 3),
          vad_threshold: Number(document.querySelector("#vadThreshold").value || 0.1),
          vad_max_speech_duration_s: Number(document.querySelector("#vadMax").value || 30),
          vad_min_silence_duration_ms: Number(document.querySelector("#vadSilence").value || 2000),
          vad_speech_pad_ms: Number(document.querySelector("#vadPad").value || 400),
          chunking_mode: document.querySelector("#chunkingMode").value || "auto",
          chunk_seconds: Number(document.querySelector("#chunkMinutes").value || 30) * 60,
          chunk_overlap_seconds: Number(document.querySelector("#chunkOverlap").value || 30),
          repetition_guard: document.querySelector("#repetitionGuard").value === "true",
        };
      }

      function setBusy(isBusy) {
        uploadButton.disabled = isBusy;
        pathButton.disabled = isBusy;
      }

      function showError(message) {
        errorBox.style.display = message ? "block" : "none";
        errorBox.textContent = message || "";
      }

      function render(payload) {
        output.textContent = JSON.stringify(payload, null, 2);
      }

      function setStatus(status, amount) {
        statusPill.textContent = status;
        statusPill.className = `pill ${status === "succeeded" || status === "failed" ? status : ""}`;
        progress.value = amount || 0;
      }

      async function requestJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        let payload = {};
        if (text) {
          try {
            payload = JSON.parse(text);
          } catch {
            payload = { raw: text };
          }
        }
        if (!response.ok) {
          throw new Error(payload.detail || response.statusText);
        }
        return payload;
      }

      async function requestNoContent(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) {
          let detail = response.statusText;
          try {
            detail = (await response.json()).detail || detail;
          } catch {}
          throw new Error(detail);
        }
      }

      async function submitUpload() {
        showError("");
        if (!modelSelect.value) {
          showError("Choose a model first.");
          return;
        }
        const file = document.querySelector("#fileInput").files[0];
        if (!file) {
          showError("Choose a file first.");
          return;
        }

        const form = new FormData();
        form.append("file", file);
        Object.entries(values()).forEach(([key, value]) => form.append(key, value));
        await submitJob("/jobs/transcribe/upload", { method: "POST", body: form });
      }

      async function submitPath() {
        showError("");
        if (!modelSelect.value) {
          showError("Choose a model first.");
          return;
        }
        const path = document.querySelector("#pathInput").value.trim();
        if (!path) {
          showError("Enter a local path first.");
          return;
        }
        await submitJob("/jobs/transcribe/path", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ path, ...values() }),
        });
      }

      async function submitJob(url, options) {
        clearInterval(state.pollTimer);
        setBusy(true);
        try {
          const job = await requestJson(url, options);
          render(job);
          setStatus(job.status, job.progress);
          state.pollTimer = setInterval(() => poll(job.job_id), 1500);
          await poll(job.job_id);
        } catch (error) {
          setBusy(false);
          showError(error.message);
        }
      }

      async function poll(jobId) {
        try {
          const job = await requestJson(`/jobs/${jobId}`);
          render(job);
          setStatus(job.status, job.progress);
          if (job.status === "succeeded") {
            clearInterval(state.pollTimer);
            const result = await requestJson(`/jobs/${jobId}/result`);
            render(result);
            setStatus("succeeded", 100);
            setBusy(false);
            await loadJobs();
          }
          if (job.status === "failed") {
            clearInterval(state.pollTimer);
            showError(job.error || "Job failed.");
            setBusy(false);
            await loadJobs();
          }
        } catch (error) {
          clearInterval(state.pollTimer);
          showError(error.message);
          setBusy(false);
        }
      }

      async function checkHealth() {
        showError("");
        try {
          const health = await requestJson("/health");
          render(health);
          setStatus(health.ok ? "healthy" : "unhealthy", health.ok ? 100 : 0);
        } catch (error) {
          showError(error.message);
        }
      }

      async function loadJobs() {
        refreshJobsButton.disabled = true;
        try {
          const jobs = await requestJson("/jobs");
          renderJobs(jobs);
        } catch (error) {
          jobsList.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        } finally {
          refreshJobsButton.disabled = false;
        }
      }

      async function loadModels() {
        try {
          const payload = await requestJson("/models");
          const models = payload.models || [];
          if (!models.length) {
            modelSelect.replaceChildren(new Option("No models found", ""));
            modelSelect.disabled = true;
            return;
          }
          modelSelect.replaceChildren(...models.map((model) => new Option(model, model)));
          modelSelect.disabled = false;
        } catch (error) {
          modelSelect.replaceChildren(new Option("Unable to load models", ""));
          modelSelect.disabled = true;
          showError(error.message);
        }
      }

      function renderJobs(jobs) {
        if (!jobs.length) {
          jobsList.innerHTML = '<div class="empty">No completed jobs yet.</div>';
          return;
        }
        jobsList.replaceChildren(...jobs.map(renderJob));
      }

      function renderJob(job) {
        const item = document.createElement("article");
        item.className = "job";
        const source = job.source || {};
        const params = job.params || {};
        const chunking = params.chunking || {};
        const metrics = job.metrics || {};
        const canDownload = job.status === "succeeded" && job.has_result;
        item.innerHTML = `
          <div class="job-head">
            <div>
              <div class="filename">${escapeHtml(source.filename || job.job_id)}</div>
              <div class="muted">${escapeHtml(formatDate(job.completed_at))} · ${escapeHtml(job.job_id)}</div>
            </div>
            <span class="pill ${escapeHtml(job.status)}">${escapeHtml(job.status)}</span>
          </div>
          <div class="job-meta">
            ${metric("Model", job.model || "n/a")}
            ${metric("Duration", formatDuration(metrics.audio_duration_seconds))}
            ${metric("Elapsed", formatDuration(metrics.elapsed_seconds))}
            ${metric("RTF / Speed", `${formatNumber(metrics.rtf)} / ${formatNumber(metrics.speedup)}x`)}
            ${metric("Language", params.language || "n/a")}
            ${metric("Chunking", chunking.mode || "n/a")}
            ${metric("Size", formatBytes(source.size_bytes))}
            ${metric("Source", source.kind || "n/a")}
          </div>
          ${job.error ? `<div class="error" style="display:block;margin-top:0">${escapeHtml(job.error)}</div>` : ""}
          <div class="job-actions">
            <a class="button-link ${canDownload ? "" : "disabled"}" href="/jobs/${encodeURIComponent(job.job_id)}/transcript.md">Download transcript</a>
            <a class="button-link secondary ${canDownload ? "" : "disabled"}" href="/jobs/${encodeURIComponent(job.job_id)}/llm-prompt.txt">Download LLM prompt</a>
            <button class="danger" type="button" data-delete-job="${escapeHtml(job.job_id)}">Delete</button>
          </div>
        `;
        item.querySelector("[data-delete-job]").addEventListener("click", () => deleteJob(job));
        return item;
      }

      function metric(label, value) {
        return `<div class="metric"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`;
      }

      async function deleteJob(job) {
        const filename = job.source?.filename || job.job_id;
        if (!confirm(`Delete job ${filename}? This removes the whole job directory.`)) {
          return;
        }
        showError("");
        try {
          await requestNoContent(`/jobs/${encodeURIComponent(job.job_id)}`, { method: "DELETE" });
          await loadJobs();
        } catch (error) {
          showError(error.message);
        }
      }

      function formatDate(value) {
        if (!value) {
          return "unknown time";
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return date.toLocaleString();
      }

      function formatDuration(value) {
        if (typeof value !== "number") {
          return "n/a";
        }
        const totalSeconds = Math.max(0, Math.round(value));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return [hours, minutes, seconds].map((part) => String(part).padStart(2, "0")).join(":");
      }

      function formatNumber(value) {
        return typeof value === "number" ? value.toFixed(3) : "n/a";
      }

      function formatBytes(value) {
        if (typeof value !== "number") {
          return "n/a";
        }
        const units = ["B", "KB", "MB", "GB"];
        let amount = value;
        let unit = 0;
        while (amount >= 1024 && unit < units.length - 1) {
          amount /= 1024;
          unit += 1;
        }
        return `${amount.toFixed(unit === 0 ? 0 : 1)} ${units[unit]}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      uploadButton.addEventListener("click", submitUpload);
      pathButton.addEventListener("click", submitPath);
      healthButton.addEventListener("click", checkHealth);
      refreshJobsButton.addEventListener("click", loadJobs);
      loadModels();
      checkHealth();
      loadJobs();
    </script>
  </body>
</html>
